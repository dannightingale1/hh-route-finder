<!DOCTYPE html>
<html>
<head>
  <title>HH Route Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 5px;
    }

    .filters {
      margin-bottom: 15px;
    }

    .filters input, .filters select {
      margin: 5px;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

     .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      object-position: center;
      display: block;
      border-bottom: 1px solid #eee;
    }
    }

    .card-content {
      padding: 12px;
    }

    .card h3 {
      margin: 0 0 5px;
    }

    .meta {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    button {
      padding: 8px 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

  </style>
</head>

<body>

<h2>🏃 HH Route Finder</h2>
<p>No one runs alone 💙</p>

<div class="filters">
  <input type="text" id="search" placeholder="Search routes...">
  
  <select id="terrain">
    <option value="">All Terrain</option>
    <option>Road</option>
    <option>Trail</option>
    <option>Mixed</option>
  </select>

  <select id="difficulty">
    <option value="">All Difficulty</option>
    <option>Easy</option>
    <option>Moderate</option>
    <option>Hilly</option>
  </select>
</div>

<div id="routes"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRfoX7-jgCe8kdf4nb9voLj57OvH6GSg7nSRuOVuwHptiaeRGinIS4ZLZTvXxE3NRtaLX8RU2naHtyV/pub?gid=0&single=true&output=csv";

let routesData = [];

fetch(SHEET_URL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);

    routesData = rows.map(r => {
      const cols = r.split(",");

      return {
        name: cols[1],
        miles: parseFloat(cols[2]),
        terrain: cols[5],
        difficulty: cols[6],
        description: cols[8],
        link: cols[9],
        image: cols[10] || "https://via.placeholder.com/400x200?text=HH+Route"
      };
    });

    displayRoutes(routesData);
  });

function displayRoutes(data) {
  const container = document.getElementById("routes");
  container.innerHTML = "";

  data.forEach(r => {
    const km = (r.miles * 1.60934).toFixed(1);

    container.innerHTML += `
      <div class="card">
        <img src="${r.image}" alt="Route image">
        <div class="card-content">
          <h3>${r.name}</h3>
          <p><strong>${r.miles} miles (${km} km)</strong></p>
          <p class="meta">${r.terrain} | ${r.difficulty}</p>
          <p>${r.description}</p>
          <a href="${r.link}" target="_blank">
            <button>View Route</button>
          </a>
        </div>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("input", filter);
document.getElementById("terrain").addEventListener("change", filter);
document.getElementById("difficulty").addEventListener("change", filter);

function filter() {
  const search = document.getElementById("search").value.toLowerCase();
  const terrain = document.getElementById("terrain").value;
  const difficulty = document.getElementById("difficulty").value;

  const filtered = routesData.filter(r =>
    r.name.toLowerCase().includes(search) &&
    (terrain === "" || r.terrain === terrain) &&
    (difficulty === "" || r.difficulty === difficulty)
  );

  displayRoutes(filtered);
}

</script>

</body>
</html>
