<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HH Route Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    header { background: #111; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
    .tabs { display: flex; gap: 10px; }
    .tab { cursor: pointer; padding: 8px 12px; background: #222; border-radius: 5px; }
    .tab.active { background: #4CAF50; }
    .menu { position: relative; }
    .kebab { cursor: pointer; font-size: 20px; padding: 5px 10px; }
    .dropdown { display: none; position: absolute; right: 0; background: white; color: black; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .dropdown div { padding: 10px; cursor: pointer; }
    .dropdown div:hover { background: #eee; }
    .container { padding: 10px; }
    .card { background: white; margin-bottom: 10px; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .card img { width: 100%; height: 160px; object-fit: cover; background: #ddd; }
    .card-content { padding: 10px; }
    .title { font-weight: bold; margin-bottom: 5px; }
    .meta { font-size: 12px; color: #666; }
    .hidden { display: none; }
    input { padding: 8px; width: 100%; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
  </style>
</head>

<body>

<header>
  <div class="tabs">
    <div class="tab active" onclick="showTab('runs')">Runs</div>
    <div class="tab" onclick="showTab('map')">Map</div>
  </div>

  <div class="menu">
    <div class="kebab" onclick="toggleMenu()">⋮</div>
    <div class="dropdown" id="menuDropdown">
      <div onclick="openMapRun()">MapRun Planner</div>
    </div>
  </div>
</header>

<div class="container">
  <div id="runsTab">
    <input type="text" id="search" placeholder="Search routes..." onkeyup="filterRoutes()">
    <div id="routes"></div>
  </div>

  <div id="mapTab" class="hidden">
    <p>Map view coming soon...</p>
  </div>
</div>

<script>

const SHEET_URL = "REPLACE_WITH_YOUR_SHEET_URL";

let routes = [];

function showTab(tab) {
  document.getElementById('runsTab').classList.add('hidden');
  document.getElementById('mapTab').classList.add('hidden');

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  if (tab === 'runs') {
    document.getElementById('runsTab').classList.remove('hidden');
    document.querySelectorAll('.tab')[0].classList.add('active');
  } else {
    document.getElementById('mapTab').classList.remove('hidden');
    document.querySelectorAll('.tab')[1].classList.add('active');
  }
}

function toggleMenu() {
  const menu = document.getElementById("menuDropdown");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function openMapRun() {
  window.open("https://maprun.co.uk", "_blank");
}

async function loadRoutes() {
  const res = await fetch(SHEET_URL);
  const data = await res.json();

  routes = data;
  displayRoutes(routes);
}

function displayRoutes(data) {
  const container = document.getElementById("routes");
  container.innerHTML = "";

  data.forEach(route => {
    const img = route.image_url && route.image_url !== ""
      ? route.image_url
      : "https://via.placeholder.com/400x200?text=HH+Route";

    const elevation = route.elevation_gain
      ? ` | ⛰ ${route.elevation_gain}m`
      : "";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${img}">
      <div class="card-content">
        <div class="title">${route.name || "Unnamed Route"}</div>
        <div class="meta">
          ${route.distance || ""} km 
          ${route.duration || ""} 
          ${elevation}
        </div>
        <a href="${route.link}" target="_blank">View Route</a>
      </div>
    `;

    container.appendChild(div);
  });
}

function filterRoutes() {
  const term = document.getElementById("search").value.toLowerCase();

  const filtered = routes.filter(r =>
    (r.name || "").toLowerCase().includes(term)
  );

  displayRoutes(filtered);
}

loadRoutes();

</script>

</body>
</html>
