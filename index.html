<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hucknall Harriers Route Tools</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .small-link {
            font-size: 0.9rem;
            color: #0077cc;
            cursor: pointer;
            text-decoration: underline;
            display: inline-block;
            margin-bottom: 10px;
        }

        #mapImage {
            width: 100%;
            max-width: 650px;
            border: 2px solid #ccc;
            margin: 10px 0;
        }

        .nav-buttons button {
            margin: 5px;
            padding: 8px 14px;
            font-size: 1rem;
        }

        #copyRoutes {
            margin-top: 15px;
            padding: 10px 16px;
            font-size: 1rem;
            background: #0077cc;
            color: white;
            border: none;
            cursor: pointer;
        }

        #copyRoutes:hover {
            background: #005fa3;
        }
    </style>
</head>

<body>

    <h1>Hucknall Harriers Route Tools</h1>

    <!-- Quick Search -->
    <a id="quickSearchLink" class="small-link">Quick search</a>

    <div id="quickSearchContainer" style="display:none;">
        <h2>Quick Search</h2>
        <p>Search functionality goes here…</p>
    </div>

    <hr>

    <!-- MapRun Planner -->
    <a id="maprunPlannerLink" class="small-link">MapRun planner</a>

    <div id="maprunPlannerContainer" style="display:none;">
        <h2>MapRun Planner</h2>
        <p>Planner UI goes here…</p>
    </div>

    <hr>

    <!-- MapRun Viewer -->
    <h2>MapRun Options</h2>

    <div id="maprunViewer">
        <div id="runCounter">Run 1 of 3</div>

        <img id="mapImage" src="map1.jpg" alt="MapRun Map">

        <div class="nav-buttons">
            <button id="prevRun">Previous</button>
            <button id="nextRun">Next</button>
        </div>

        <button id="copyRoutes">Copy routes to clipboard</button>
    </div>

    <script>
        // -----------------------------
        // Quick Search toggle
        // -----------------------------
        document.getElementById("quickSearchLink").addEventListener("click", () => {
            document.getElementById("quickSearchContainer").style.display = "block";
        });

        // -----------------------------
        // MapRun Planner toggle
        // -----------------------------
        document.getElementById("maprunPlannerLink").addEventListener("click", () => {
            document.getElementById("maprunPlannerContainer").style.display = "block";
        });

        // -----------------------------
        // MapRun Data (replace with real data)
        // -----------------------------
        const mapruns = [
            {
                image: "map1.jpg",
                short: "https://example.com/short1",
                medium: "https://example.com/medium1",
                long: "https://example.com/long1"
            },
            {
                image: "map2.jpg",
                short: "https://example.com/short2",
                medium: "https://example.com/medium2",
                long: "https://example.com/long2"
            },
            {
                image: "map3.jpg",
                short: "https://example.com/short3",
                medium: "https://example.com/medium3",
                long: "https://example.com/long3"
            }
        ];

        let currentIndex = 0;

        function renderMaprun() {
            const total = mapruns.length;
            const item = mapruns[currentIndex];

            document.getElementById("runCounter").textContent =
                `Run ${currentIndex + 1} of ${total}`;

            document.getElementById("mapImage").src = item.image;
        }

        document.getElementById("prevRun").addEventListener("click", () => {
            currentIndex = (currentIndex - 1 + mapruns.length) % mapruns.length;
            renderMaprun();
        });

        document.getElementById("nextRun").addEventListener("click", () => {
            currentIndex = (currentIndex + 1) % mapruns.length;
            renderMaprun();
        });

        // -----------------------------
        // Copy Routes Button
        // -----------------------------
        document.getElementById("copyRoutes").addEventListener("click", () => {
            const item = mapruns[currentIndex];

            const text =
`Short Route: ${item.short}

Medium Route: ${item.medium}

Long Route: ${item.long}`;

            navigator.clipboard.writeText(text).then(() => {
                alert("Copied to clipboard!");
            });
        });

        // Initial render
        renderMaprun();
    </script>

</body>
</html>
